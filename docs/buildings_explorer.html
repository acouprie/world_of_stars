<!DOCTYPE html>
<html lang="fr">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World of Stars — Explorateur de bâtiments</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d0e12;
    --bg2: #14151c;
    --surface: #1c1d27;
    --border: #2a2b38;
    --border2: #3a3b4a;
    --text: #e8e4d8;
    --muted: #a09e96;
    --subtle: #5e5d58;
    --primary: #c8a96e;
    --secondary: #4e8faf;
    --quantum: #2ec4a0;
    --varek: #e8622a;
    --energy-color: #c8a96e;
    --prod-color: #2ec4a0;
    --storage-color: #4e8faf;
    --infra-color: #8b7fcc;
    --mil-color: #e8622a;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
  a { color: var(--primary); }

  /* Layout */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 1.5rem 1rem; overflow-y: auto; }
  .main { padding: 1.5rem; overflow-y: auto; }

  /* Header */
  .logo { font-size: 18px; font-weight: 600; color: var(--primary); margin-bottom: 4px; letter-spacing: 0.5px; }
  .logo-sub { font-size: 11px; color: var(--subtle); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

  /* Category filters */
  .cat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--subtle); margin-bottom: 8px; }
  .cat-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 1.5rem; }
  .cat-btn { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius); border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; text-align: left; transition: all .15s; width: 100%; }
  .cat-btn:hover { background: var(--surface); color: var(--text); }
  .cat-btn.active { background: var(--surface); color: var(--text); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Building list */
  .blist { display: flex; flex-direction: column; gap: 3px; }
  .bitem { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; transition: all .15s; border: 1px solid transparent; }
  .bitem:hover { background: var(--surface); }
  .bitem.sel { background: var(--surface); border-color: var(--border2); }
  .bitem-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .bitem-name { font-size: 13px; color: var(--text); flex: 1; }
  .bitem-levels { font-size: 11px; color: var(--subtle); }

  /* Main content */
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--subtle); text-align: center; gap: 12px; }
  .placeholder-icon { font-size: 48px; opacity: 0.3; }

  .detail-header { margin-bottom: 1.5rem; }
  .detail-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .detail-meta { font-size: 13px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-energy { background: rgba(200,169,110,0.15); color: var(--primary); }
  .badge-production { background: rgba(46,196,160,0.15); color: var(--quantum); }
  .badge-storage { background: rgba(78,143,175,0.15); color: var(--secondary); }
  .badge-infrastructure { background: rgba(139,127,204,0.15); color: #8b7fcc; }
  .badge-military { background: rgba(232,98,42,0.15); color: var(--varek); }

  /* Level control */
  .level-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .level-ctrl { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .level-ctrl label { font-size: 12px; color: var(--muted); min-width: 55px; }
  .level-ctrl input[type=range] { flex: 1; accent-color: var(--primary); }
  .level-val { font-size: 13px; font-weight: 600; color: var(--primary); min-width: 40px; text-align: right; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--subtle); margin-bottom: 3px; }
  .stat-val { font-size: 18px; font-weight: 600; color: var(--text); }
  .stat-unit { font-size: 11px; color: var(--muted); margin-left: 2px; }
  .stat-val.accent { color: var(--primary); }
  .stat-val.green { color: var(--quantum); }
  .stat-val.blue { color: var(--secondary); }
  .stat-val.red { color: var(--varek); }

  /* Chart */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .chart-title { font-size: 12px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
  .lg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .lgsq { width: 8px; height: 8px; border-radius: 2px; }

  /* Radar info */
  .radar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .radar-card h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .radar-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .radar-row:last-child { border-bottom: none; }
  .radar-lv { font-size: 11px; font-weight: 600; color: var(--subtle); min-width: 38px; padding-top: 1px; }
  .radar-lv.active { color: var(--primary); }
  .radar-txt { font-size: 12px; color: var(--subtle); }
  .radar-txt.active { color: var(--text); }
  .radar-txt.current { color: var(--primary); font-weight: 500; }

  /* Bunker */
  .bunker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Command Center requirements */
  .cc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .cc-card h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .cc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cc-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); color: var(--muted); }
  .cc-table tr:last-child td { border-bottom: none; }
  .cc-table td:first-child { color: var(--subtle); }
  .cc-table td:last-child { color: var(--text); font-weight: 500; }

  /* Note */
  .note { background: rgba(200,169,110,0.05); border-left: 2px solid var(--primary); border-radius: 0 var(--radius) var(--radius) 0; padding: 10px 12px; font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* Energy summary */
  .energy-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .energy-card h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .energy-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .energy-row:last-child { border-bottom: none; font-weight: 600; color: var(--primary); }
  .energy-total-row { display: flex; justify-content: space-between; padding: 8px 0 0; margin-top: 4px; font-size: 13px; font-weight: 600; color: var(--primary); border-top: 1px solid var(--border2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .cat-list { flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .cat-btn { width: auto; padding: 5px 10px; }
    .blist { flex-direction: row; flex-wrap: wrap; }
    .bitem { flex: 0 1 calc(50% - 4px); }
  }
</style>
</head>

    [300,200,150,30,0,45],[600,400,300,50,0,86],[1200,800,600,70,0,162],[2400,1600,1200,90,0,308],[4800,3200,2400,110,0,1114],[9600,6400,4800,130,0,2030],[19200,12800,9600,155,0,2717],[38400,25600,19200,175,0,4022],[76800,51200,38400,185,0,7646],[153600,102400,76800,200,0,14521]]},
  ship_factory:{name:'Usine spatiale',cat:'military',levels:15,note:'Très intensive en thorium. Chaque niveau débloque des vaisseaux. Centre de Commandement niv 11 pour niv 15.',data:[
    [250,100,320,50,0,60],[500,200,640,90,0,114],[1000,400,1280,130,0,216],[2000,800,2560,165,0,411],[4000,1600,5120,205,0,782],[8000,3200,10240,245,0,1485],[16000,6400,20480,285,0,2822],[32000,12800,40960,325,0,5363],[64000,25600,81920,365,0,10190],[128000,51200,163840,405,0,19361],[256000,102400,327680,445,0,36786],[512000,204000,655360,480,0,69894],[1024000,409600,1310720,520,0,132799],[2048000,819200,2621440,560,0,216317],[4096000,1638400,5242880,600,0,479404]]},
  bunker:{name:'Bunker',cat:'military',levels:10,note:'Protection globale partagée (métal+nourriture+thorium). Ralentit en late pour garder le risque réel.',
    bunker_res:[5000,12000,25000,50000,100000,175000,275000,375000,450000,500000],
    bunker_sol:[50,120,250,500,1000,2000,4000,7000,12000,20000],
    data:[[1000,1000,3000,0,0,90],[2000,2000,6000,0,0,171],[4000,4000,12000,0,0,325],[8000,8000,24000,0,0,617],[16000,16000,48000,0,0,1172],[32000,32000,96000,0,0,2228],[64000,64000,192000,0,0,4234],[128000,128000,348000,0,0,8045],[256000,256000,768000,0,0,15288],[512000,512000,1536000,0,0,29042]]}
};

function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(n>=10000?0:1)+'k';return String(n)}
function fmtTime(s){if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m '+Math.round(s%60)+'s';if(s<86400)return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';const d=Math.floor(s/86400);const h=Math.floor((s%86400)/3600);return d+'j '+h+'h'}

let selCat='all',selBuilding=null,selLevel=1,chartInst=null;

function renderCats(){
  document.getElementById('cats').innerHTML=`<button class="cat-btn${selCat==='all'?' active':''}" onclick="setCat('all')"><span class="cat-dot" style="background:#888"></span>Tous les bâtiments</button>`
    +Object.entries(CAT).map(([k,v])=>`<button class="cat-btn${selCat===k?' active':''}" onclick="setCat('${k}')"><span class="cat-dot" style="background:${v.color}"></span>${v.label}</button>`).join('');
}

function setCat(c){selCat=c;renderCats();renderList()}

function renderList(){
  const keys=Object.keys(BUILDINGS).filter(k=>selCat==='all'||BUILDINGS[k].cat===selCat);
  document.getElementById('blist').innerHTML=keys.map(k=>{
    const b=BUILDINGS[k];
    return`<div class="bitem${selBuilding===k?' sel':''}" onclick="select('${k}')">
      <span class="bitem-dot" style="background:${CAT[b.cat].color}"></span>
      <span class="bitem-name">${b.name}</span>
      <span class="bitem-levels">${b.levels}</span>
    </div>`;
  }).join('');
}

function select(k){selBuilding=k;selLevel=1;renderList();renderDetail()}

function renderDetail(){
  if(!selBuilding){document.getElementById('main').innerHTML='<div class="placeholder"><div class="placeholder-icon">🏗️</div><div style="font-size:16px;color:var(--muted)">Sélectionne un bâtiment</div></div>';return}
  const b=BUILDINGS[selBuilding];
  const lv=selLevel-1;
  const [metal,food,thorium,energy,prod,time]=b.data[lv];
  const col=CAT[b.cat].color;
  const isEnergy=b.cat==='energy';
  const isProd=b.cat==='production';
  const isStorage=b.cat==='storage';
  const isBunker=selBuilding==='bunker';
  const isRadar=selBuilding==='radar_satellite';
  const hasPortalEnergy=selBuilding==='quantum_portal';
  const isMilitary=b.cat==='military';

  let prodStatHtml='';
  if(isEnergy)prodStatHtml=`<div class="stat"><div class="stat-label">Production</div><div class="stat-val accent">${fmt(prod)}<span class="stat-unit">⚡</span></div></div>`;
  else if(isProd&&prod>0)prodStatHtml=`<div class="stat"><div class="stat-label">Production</div><div class="stat-val green">${fmt(prod)}<span class="stat-unit">/h</span></div></div>`;
  else if(isStorage)prodStatHtml=`<div class="stat"><div class="stat-label">Capacité</div><div class="stat-val blue">${fmt(prod)}</div></div>`;
  else if(isBunker)prodStatHtml=`<div class="stat"><div class="stat-label">Ressources prot.</div><div class="stat-val green">${fmt(b.bunker_res[lv])}</div></div><div class="stat"><div class="stat-label">Soldats prot.</div><div class="stat-val blue">${fmt(b.bunker_sol[lv])}</div></div>`;

  let energyStatHtml='';
  if(energy>0)energyStatHtml=`<div class="stat"><div class="stat-label">Énergie conso.</div><div class="stat-val red">${energy}<span class="stat-unit">⚡</span></div></div>`;

  let unlockHtml='';
  if(b.unlocks){
    unlockHtml=`<div class="cc-card"><h3>Unités débloquées</h3><table class="cc-table">${b.unlocks.map((u,i)=>`<tr><td>Niv ${i+1}</td><td>${u}</td></tr>`).join('')}</table></div>`;
  }

  let ccHtml='';
  const req=CC_REQ[selBuilding];
  if(req&&req.length>0){
    ccHtml=`<div class="cc-card"><h3>Prérequis Centre de commandement</h3><table class="cc-table">${req.map(([cc,bmax])=>`<tr><td>Centre de Commandement niv ${cc}</td><td>→ ${b.name.split(' ')[0]} niv ${bmax} max</td></tr>`).join('')}</table></div>`;
  }

  let radarHtml='';
  if(isRadar){
    radarHtml=`<div class="radar-card"><h3>Information révélée par niveau</h3>${b.radar.map((r,i)=>{
      const cls=i<lv?'active':i===lv?'current':'';
      return`<div class="radar-row"><span class="radar-lv ${cls}">Niv ${i+1}</span><span class="radar-txt ${cls}">${r}</span></div>`;
    }).join('')}</div>`;
  }

  let energySummaryHtml='';
  if(isEnergy){
    energySummaryHtml=`<div class="energy-card"><h3>Bilan énergétique — planète tout au max</h3>
      <div class="energy-row"><span style="color:var(--muted)">3 mines + ferme niv 20</span><span style="color:var(--varek)">−1 434 ⚡</span></div>
      <div class="energy-row"><span style="color:var(--muted)">Portail quantique niv 10</span><span style="color:var(--varek)">−348 ⚡</span></div>
      <div class="energy-row"><span style="color:var(--muted)">training_camp niv 10</span><span style="color:var(--varek)">−150 ⚡</span></div>
      <div class="energy-row"><span style="color:var(--muted)">military_camp niv 10</span><span style="color:var(--varek)">−200 ⚡</span></div>
      <div class="energy-row"><span style="color:var(--muted)">ship_factory niv 15</span><span style="color:var(--varek)">−600 ⚡</span></div>
      <div class="energy-total-row"><span>Total requis</span><span>2 732 ⚡</span></div>
      <div style="margin-top:10px;font-size:11px;color:var(--subtle)">Config min : 1 solar niv13 + 1 nuclear niv10 = 2 858 ⚡ (marge +126)</div>
    </div>`;
  }

  document.getElementById('main').innerHTML=`
    <div class="detail-header">
      <div class="detail-title">${b.name}</div>
      <div class="detail-meta">
        <span class="badge badge-${b.cat}">${CAT[b.cat].label}</span>
        <span style="color:var(--subtle)">${b.levels} niveaux</span>
        ${energy===0&&!isEnergy?'<span style="color:var(--subtle)">0 ⚡ consommée</span>':''}
      </div>
    </div>

    <div class="level-card">
      <div class="level-ctrl">
        <label>Niveau</label>
        <input type="range" min="1" max="${b.levels}" value="${selLevel}" step="1" oninput="setLv(this.value)">
        <span class="level-val" id="lvout">${selLevel} / ${b.levels}</span>
      </div>
      <div class="stats" id="stats">
        <div class="stat"><div class="stat-label">Métal</div><div class="stat-val" id="s-metal">${fmt(metal)}</div></div>
        <div class="stat"><div class="stat-label">Nourriture</div><div class="stat-val" id="s-food">${fmt(food)}</div></div>
        ${thorium>0||b.data.some(r=>r[2]>0)?`<div class="stat"><div class="stat-label">Thorium</div><div class="stat-val" id="s-thor">${fmt(thorium)}</div></div>`:''}
        ${prodStatHtml}
        ${energyStatHtml}
        <div class="stat"><div class="stat-label">Durée</div><div class="stat-val" id="s-time" style="font-size:13px">${fmtTime(time)}</div></div>
      </div>
    </div>

    ${radarHtml}

    <div class="chart-card">
      <div class="chart-title">Courbe de progression</div>
      <div class="legend" id="legend"></div>
      <div class="chart-wrap"><canvas id="bc" role="img" aria-label="Courbe de progression pour ${b.name}">Progression sur ${b.levels} niveaux.</canvas></div>
    </div>

    ${ccHtml}
    ${unlockHtml}
    ${energySummaryHtml}
    <div class="note">${b.note}</div>
  `;

  buildLegend(b);
  setTimeout(()=>buildChart(b,lv),50);
}

function buildLegend(b){
  const hasThor=b.data.some(r=>r[2]>0);
  const col=CAT[b.cat].color;
  const isEnergy=b.cat==='energy';const isProd=b.cat==='production';const isStorage=b.cat==='storage';const isBunker=selBuilding==='bunker';
  const hasProd=(isEnergy||isProd||isStorage||isBunker)&&(isBunker?b.bunker_res:b.data.map(r=>r[4])).some(v=>v>0);
  let html=`<span class="lg"><span class="lgsq" style="background:#4e8faf"></span>Métal</span><span class="lg"><span class="lgsq" style="background:#2ec4a0"></span>Nourriture</span>`;
  if(hasThor)html+=`<span class="lg"><span class="lgsq" style="background:#d4537e"></span>Thorium</span>`;
  if(hasProd)html+=`<span class="lg"><span class="lgsq" style="background:${col}"></span>${isEnergy?'Énergie':isProd?'Production':isStorage?'Capacité':'Ressources prot.'}</span>`;
  document.getElementById('legend').innerHTML=html;
}

function buildChart(b,activeLv){
  if(chartInst){chartInst.destroy();chartInst=null}
  const labels=b.data.map((_,i)=>String(i+1));
  const metals=b.data.map(r=>r[0]);
  const foods=b.data.map(r=>r[1]);
  const thoriums=b.data.map(r=>r[2]);
  const prods=selBuilding==='bunker'?b.bunker_res:b.data.map(r=>r[4]);
  const hasThor=thoriums.some(v=>v>0);
  const isEnergy=b.cat==='energy';const isProd=b.cat==='production';const isStorage=b.cat==='storage';const isBunker=selBuilding==='bunker';
  const hasProd=(isEnergy||isProd||isStorage||isBunker)&&prods.some(v=>v>0);
  const col=CAT[b.cat].color;

  const datasets=[
    {label:'Métal',data:metals,borderColor:'#4e8faf',backgroundColor:'rgba(78,143,175,0.06)',borderWidth:1.5,pointRadius:2,pointHoverRadius:4,tension:0.3},
    {label:'Nourriture',data:foods,borderColor:'#2ec4a0',backgroundColor:'rgba(46,196,160,0.06)',borderWidth:1.5,pointRadius:2,pointHoverRadius:4,tension:0.3},
  ];
  if(hasThor)datasets.push({label:'Thorium',data:thoriums,borderColor:'#d4537e',backgroundColor:'rgba(212,83,126,0.06)',borderWidth:1.5,pointRadius:2,pointHoverRadius:4,tension:0.3});
  if(hasProd)datasets.push({label:isEnergy?'Énergie':isProd?'Production':isStorage?'Capacité':'Ressources prot.',data:prods,borderColor:col,backgroundColor:'rgba(0,0,0,0)',borderWidth:2,borderDash:[5,3],pointRadius:2,pointHoverRadius:4,tension:0.3,yAxisID:'y2'});

  const cvs=document.getElementById('bc');if(!cvs)return;
  chartInst=new Chart(cvs,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,backgroundColor:'#1c1d27',borderColor:'#2a2b38',borderWidth:1,titleColor:'#a09e96',bodyColor:'#e8e4d8',callbacks:{label:i=>`${i.dataset.label}: ${fmt(i.raw)}`}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5e5d58',font:{size:10},maxTicksLimit:10}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5e5d58',font:{size:10},callback:v=>fmt(v)}},
        ...(hasProd?{y2:{position:'right',grid:{drawOnChartArea:false},ticks:{color:col,font:{size:10},callback:v=>fmt(v)}}}:{})
      }
    }
  });
}

function setLv(v){
  selLevel=parseInt(v);
  const b=BUILDINGS[selBuilding];
  const lv=selLevel-1;
  const [metal,food,thorium,energy,prod,time]=b.data[lv];
  document.getElementById('lvout').textContent=`${selLevel} / ${b.levels}`;
  const m=document.getElementById('s-metal');if(m)m.textContent=fmt(metal);
  const f=document.getElementById('s-food');if(f)f.textContent=fmt(food);
  const t=document.getElementById('s-thor');if(t)t.textContent=fmt(thorium);
  const tm=document.getElementById('s-time');if(tm)tm.textContent=fmtTime(time);
  if(selBuilding==='radar_satellite'){
    document.querySelectorAll('.radar-lv,.radar-txt').forEach((el,i)=>{
      const row=Math.floor(i/2);
      el.className=el.className.replace(/ ?(active|current)/g,'');
      if(row<lv)el.classList.add('active');
      else if(row===lv)el.classList.add('current');
    });
  }
}

renderCats();renderList();
</script>
</body>
</html>
